<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="{{ site.author.name }}">
  <meta name="theme-color" content="#0063a6">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <header class="site-header">
    <div class="header-inner">
      <a class="site-brand" href="{{ '/' | relative_url }}">
        <span class="brand-name">{{ site.author.name }}</span>
        <span class="brand-sub">{{ site.author.title2 }}</span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        {% for item in site.navigation %}<a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="active" aria-current="page"{% endif %}>{{ item.title }}</a>{% endfor %}
      </nav>
    </div>
  </header>

  <div class="page-wrap">
    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>
    <main id="main-content" class="content">
      {{ content }}
    </main>
  </div>

  <footer class="site-footer">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name }}</p>
  </footer>
</body>
</html>
