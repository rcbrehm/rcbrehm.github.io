<div class="author-card">
  <img class="author-avatar" src="{{ site.author.headshot | relative_url }}" alt="{{ site.author.name }}" width="200" height="200">
  <h2 class="author-name">{{ site.author.name }}</h2>
  <p class="author-title">{{ site.author.title1 }}<br>{{ site.author.title2 }}</p>
  <p class="author-title">{{ site.author.title3 }}<br>{{ site.author.title4 }}</p>
  <ul class="author-links">
    {% for link in site.author.links %}
    <li><a href="{{ link.url }}" title="{{ link.label }}"><i class="{{ link.icon }}" aria-hidden="true"></i><span>{{ link.label }}</span></a></li>
    {% endfor %}
  </ul>
</div>
